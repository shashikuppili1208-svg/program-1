<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Mini-Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <!-- Header -->
    <header>
        <h1> MyShop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2 align="center">Welcome to MyShop</h2>
        <p>Best products at the best prices</p>
    </section>

    <!-- Products Section -->
    <section class="products">
	<nav>
        <div class="product-card">
            <img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/5/i/n/-original-imahft5ndwfkx6ez.jpeg?q=70&crop=false" alt="Product 1">
            <h3>apple mobile</h3>
            <p>$100.00</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/i/b/d/-original-imahfz2tuqdczpfg.jpeg?q=70" alt="Product 2">
            <h3>samsung mobile</h3>
            <p>$120.00</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/q/k/q/-original-imahj8rgvp6zwgmy.jpeg?q=70" alt="Product 3">
            <h3>realme mobile</h3>
            <p>$80.00</p>
            <button>Add to Cart</button>
        </div>
		
		<div class="product-card">
            <img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/n/7/x/-original-imahfvpcg8zevgbr.jpeg?q=70" alt="Product 4">
            <h3>motorola</h3>
            <p>$160.00</p>
            <button>Add to Cart</button>
        </div>
		
		<div class="product-card">
            <img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/y/l/1/-original-imahbfd4cgh53kmh.jpeg?q=70" alt="Product 5">
            <h3>opp</h3>
            <p>$100.00</p>
            <button>Add to Cart</button>
        </div>
	</nav>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyShop. All rights reserved.</p>
    </footer>


    <header>
        <h1>UrbanStore</h1>
        <div id="cart-icon" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main id="product-list">
        </main>

    <div id="cart-sidebar" class="hidden">
        <button onclick="toggleCart()">Close</button>
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <hr>
        <p>Total: $<span id="total-price">0.00</span></p>
        <button class="checkout-btn">Checkout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
